apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maintenance-app
  template:
    metadata:
      labels:
        app: maintenance-app
    spec:
      containers:
      - name: maintenance-app
        image: <your-ecr-url>/maintenance-app:latest
        ports:
        - containerPort: 8000
        env:
        - name: AWS_REGION
          value: "ca-central-1"
