AWSTemplateFormatVersion: '2010-09-09'
Description: >
  EKS Cluster with 3 nodes via CloudFormation:
  - VPC, subnets (public/private), SGs
  - IAM Roles & policies
  - EKS Cluster "Cloud_Formation_EKS_Cluster"
  - Managed NodeGroup (3 EC2 Linux worker nodes)

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: eks_vm_keypair
    Description: SSH key pair for all instances

Resources:
  # VPC
  EKSVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 192.168.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: EKS_Cluster_VPC}]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{Key: Name, Value: IGW_EKS}]

  AttachIGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref EKSVPC
      InternetGatewayId: !Ref InternetGateway

  # Subnets
  EKSSubnetMaster:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EKSVPC
      CidrBlock: 192.168.1.0/24
      AvailabilityZone: ca-central-1a
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: EKS_Cluster_subnet1_master}]

  EKSSubnetWorker:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EKSVPC
      CidrBlock: 192.168.2.0/24
      AvailabilityZone: ca-central-1a
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: EKS_Cluster_subnet2_worker}]

  # Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EKSVPC
      Tags: [{Key: Name, Value: EKS_Public_RT}]

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteMaster:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref EKSSubnetMaster
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteWorker:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref EKSSubnetWorker
      RouteTableId: !Ref PublicRouteTable

  # Security Groups
  EKSMasterSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Master control plane access
      VpcId: !Ref EKSVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 192.168.0.0/16
      Tags: [{Key: Name, Value: eks_master_security_group}]

  EKSNodeSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Worker nodes SG
      VpcId: !Ref EKSVPC
      SecurityGroupIngress:
        # SSH from anywhere
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        # K8s node communication
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 192.168.0.0/16
      Tags: [{Key: Name, Value: eks_node_security_group}]

  # IAM Roles & Policies
  EksMasterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eks_master_role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: eks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  EksNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eks_node_role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  # EKS Cluster
  EksCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: Cloud_Formation_EKS_Cluster
      Version: '1.26'
      RoleArn: !GetAtt EksMasterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref EKSSubnetMaster
          - !Ref EKSSubnetWorker
        SecurityGroupIds:
          - !Ref EKSMasterSG
        EndpointPublicAccess: true
        EndpointPrivateAccess: true

  # Managed Node Group
  EksNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref EksCluster
      NodegroupName: CloudFormationEKSWorkerNodes
      NodeRole: !GetAtt EksNodeRole.Arn
      Subnets:
        - !Ref EKSSubnetWorker
      ScalingConfig:
        MinSize: 1
        DesiredSize: 3
        MaxSize: 5
      AmiType: AL2_x86_64
      InstanceTypes: [t3.medium]
      DiskSize: 20
      RemoteAccess:
        Ec2SshKey: !Ref KeyPairName
        SourceSecurityGroups: [!Ref EKSNodeSG]

Outputs:
  ClusterName:
    Value: !Ref EksCluster
  NodeGroup:
    Value: !GetAtt EksNodeGroup.NodegroupName
