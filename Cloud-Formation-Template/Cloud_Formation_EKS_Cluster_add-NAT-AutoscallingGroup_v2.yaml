AWSTemplateFormatVersion: '2010-09-09'
Description: EKS Cluster with private worker nodes, NAT Gateway, and autoscaling group

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: eks_vm_keypair
    Description: SSH key pair for all nodes

Resources:
  # VPC Setup
  EKSVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 192.168.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EKS_Cluster_VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: EKS_IGW

  AttachIGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref EKSVPC
      InternetGatewayId: !Ref InternetGateway

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachIGW
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: AttachIGW
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      SubnetId: !Ref PublicSubnetMaster
      Tags:
        - Key: Name
          Value: EKS_NAT_Gateway

  # Subnets
  PublicSubnetMaster:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EKSVPC
      CidrBlock: 192.168.1.0/24
      AvailabilityZone: ca-central-1a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: EKS_Cluster_subnet1_master

  PrivateSubnetWorker:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EKSVPC
      CidrBlock: 192.168.2.0/24
      AvailabilityZone: ca-central-1a
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: EKS_Cluster_subnet2_worker

  # Route Tables & Associations
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EKSVPC
      Tags:
        - Key: Name
          Value: EKS_Public_RouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRoute:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetMaster
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EKSVPC
      Tags:
        - Key: Name
          Value: EKS_Private_RouteTable

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetRoute:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetWorker
      RouteTableId: !Ref PrivateRouteTable

  # Security Groups
  EksMasterSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Master control plane SG
      VpcId: !Ref EKSVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 192.168.0.0/16
      Tags:
        - Key: Name
          Value: eks_master_security_group

  EksNodeSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Worker nodes SG
      VpcId: !Ref EKSVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 192.168.0.0/16
      Tags:
        - Key: Name
          Value: eks_node_security_group

  # IAM Roles
  EksMasterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eks_master_role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  EksNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eks_node_role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  # EKS Cluster
  EksCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: Cloud_Formation_EKS_Cluster
      Version: '1.26'
      RoleArn: !GetAtt EksMasterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PublicSubnetMaster
          - !Ref PrivateSubnetWorker
        SecurityGroupIds:
          - !Ref EksMasterSG
        EndpointPublicAccess: true
        EndpointPrivateAccess: true

  # NodeGroup Autoscaling
  EksNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref EksCluster
      NodegroupName: CloudFormationEKSWorkerNodes
      NodeRole: !GetAtt EksNodeRole.Arn
      Subnets:
        - !Ref PrivateSubnetWorker
      ScalingConfig:
        MinSize: 1
        DesiredSize: 3
        MaxSize: 5
      AmiType: AL2_x86_64
      InstanceTypes: [t2.micro]
      DiskSize: 20
      RemoteAccess:
        Ec2SshKey: !Ref KeyPairName
        SourceSecurityGroups: [!Ref EksNodeSG]

Outputs:
  EKSClusterName:
    Description: EKS Cluster Name
    Value: !Ref EksCluster
  NodeGroupName:
    Description: EKS Worker NodeGroup Name
    Value: !GetAtt EksNodeGroup.NodegroupName
